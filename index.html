<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Interventi</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --verde:         #9DBF60;
  --grigio:        #77797a;
  --grigio-chiaro: #aaaaaa;
  --navy:          #4A4C4D;
  --blue:          #77797a;
  --blue-mid:      #9DBF60;
  --blue-light:    #D5E3B7;
  --blue-xlight:   #EEF5E3;
  --accent:        #9DBF60;
  --accent-light:  #EEF5E3;
  --red:           #C0392B;
  --red-light:     #FDECEA;
  --green:         #9DBF60;
  --green-light:   #EEF5E3;
  --purple:        #8E44AD;
  --purple-light:  #F4EAF9;
  --g50:  #F8F9F8;
  --g100: #F0F2EE;
  --g200: #E2E6DF;
  --g300: #C8CEC4;
  --g500: #77797a;
  --g700: #4A4C4D;
  --g900: #2A2C2D;
  --sh-sm: 0 1px 3px rgba(74,76,77,.08), 0 1px 2px rgba(74,76,77,.05);
  --sh-md: 0 4px 12px rgba(74,76,77,.10);
  --sh-lg: 0 12px 32px rgba(74,76,77,.14), 0 4px 10px rgba(74,76,77,.07);
  --r:   10px;
  --rsm:  6px;
  --rlg: 16px;
  font-family: 'Raleway', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--g50); color: var(--g900); font-family: 'Raleway', sans-serif; font-size: 14px; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--navy); color: #fff; padding: 10px 22px; border-radius: 8px;
  font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: all .3s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.tok  { background: var(--verde); }
#toast.terr { background: var(--red); }

/* ── Login ── */
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--g50)}
.lcard{background:#fff;border-radius:var(--rlg);padding:40px 38px;width:100%;max-width:420px;box-shadow:var(--sh-lg);border:1px solid var(--g200)}
.lfield{margin-bottom:16px}
.lfield label{display:block;font-size:12px;font-weight:600;color:var(--g700);letter-spacing:.5px;margin-bottom:6px}
.lfield input{width:100%;padding:11px 14px;border:1px solid var(--g200);border-radius:var(--rsm);background:#EEF5E3;font-family:'Raleway',sans-serif;font-size:14px;color:var(--g900);outline:none;transition:border-color .2s}
.lfield input:focus{border-color:var(--verde)}
.lbtn{width:100%;padding:12px;background:var(--verde);color:#fff;border:none;border-radius:var(--rsm);font-family:'Raleway',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.lbtn:hover{opacity:.88}
.lerr{background:var(--red-light);color:var(--red);border-radius:var(--rsm);padding:10px 14px;font-size:13px;margin-top:14px;display:none}

/* ── App shell ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }
#topbar {
  background: #fff; border-bottom: 1px solid var(--g200); padding: 0 28px;
  position: sticky; top: 0; z-index: 100; box-shadow: var(--sh-sm);
}
#tb-top {
  height: 52px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--g100);
}
#tb-right { display: flex; align-items: center; gap: 14px; }
#tb-date, #tb-user { font-size: 12px; color: var(--g500); }
#tb-role {
  font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
  background: var(--blue-xlight); color: var(--verde); padding: 3px 9px; border-radius: 20px;
}
#lout {
  font-size: 11px; font-weight: 700; color: var(--g500); background: none;
  border: 1.5px solid var(--g300); border-radius: 6px; padding: 5px 13px;
  cursor: pointer; font-family: 'Raleway', sans-serif; letter-spacing: .4px;
  text-transform: uppercase; transition: all .17s;
}
#lout:hover { border-color: var(--red); color: var(--red); }
#tb-nav { height: 40px; display: flex; align-items: stretch; }
.tnb {
  display: flex; align-items: center; gap: 6px; padding: 0 16px;
  font-size: 12.5px; font-weight: 600; color: var(--g500);
  cursor: pointer; border: none; background: none;
  font-family: 'Raleway', sans-serif; letter-spacing: .3px;
  border-bottom: 2.5px solid transparent; transition: all .17s;
  text-transform: uppercase;
}
.tnb:hover { color: var(--g700); border-bottom-color: var(--g300); }
.tnb.active { color: var(--verde); border-bottom-color: var(--verde); }
main#main { flex: 1; padding: 28px; }

/* ── Pagine ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-size: 20px; font-weight: 700; color: var(--g900);
}
.page-subtitle { font-size: 12px; color: var(--g500); margin-top: 2px; }

/* ── Bottoni ── */
.btn {
  padding: 9px 18px; border-radius: var(--rsm); border: none; cursor: pointer;
  font-family: 'Raleway', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .3px; transition: all .17s; display: inline-flex; align-items: center; gap: 7px;
}
.btn-primary { background: var(--verde); color: #fff; }
.btn-primary:hover { background: #8aad4e; }
.btn-secondary { background: var(--g100); color: var(--g700); border: 1.5px solid var(--g200); }
.btn-secondary:hover { background: var(--g200); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1.5px solid #f5c6c2; }
.btn-danger:hover { background: #fbd0cc; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { padding: 6px 10px; }

/* ── Filtri ── */
.filters-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: #fff; border: 1px solid var(--g200); border-radius: var(--r);
  padding: 12px 16px; margin-bottom: 16px; box-shadow: var(--sh-sm);
}
.filters-bar label { font-size: 11px; font-weight: 700; color: var(--g500);
  letter-spacing: .6px; text-transform: uppercase; }
.fi {
  padding: 7px 11px; border: 1.5px solid var(--g200); border-radius: var(--rsm);
  font-family: 'Raleway', sans-serif; font-size: 13px; color: var(--g900);
  background: var(--g50); outline: none; transition: border-color .2s;
}
.fi:focus { border-color: var(--verde); }
.fi-search { min-width: 200px; }

/* ── Tabella ── */
.table-wrap {
  background: #fff; border: 1px solid var(--g200); border-radius: var(--r);
  box-shadow: var(--sh-sm); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--g50); font-size: 10.5px; font-weight: 700; color: var(--g500);
  letter-spacing: .8px; text-transform: uppercase; padding: 10px 14px;
  border-bottom: 2px solid var(--g200); text-align: left; white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--g100); transition: background .13s; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--g50); }
tbody td { padding: 10px 14px; font-size: 13px; color: var(--g700); vertical-align: middle; }
.td-num { font-weight: 700; color: var(--verde); font-size: 13px; }
.td-nome { font-weight: 600; color: var(--g900); }
.td-muted { color: var(--g500); font-size: 12px; }
.badge {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 10.5px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
}
.badge-dx { background: #EEF5E3; color: #5a8a2a; }
.badge-sx { background: #EAF0FF; color: #2a5aaa; }
.badge-bi { background: var(--purple-light); color: var(--purple); }

/* ── Stats cards ── */
.stats-row { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card {
  background: #fff; border: 1px solid var(--g200); border-radius: var(--r);
  padding: 16px 22px; box-shadow: var(--sh-sm); flex: 1; min-width: 140px;
}
.stat-card .sv { font-size: 28px; font-weight: 800; color: var(--verde); line-height: 1; }
.stat-card .sl { font-size: 11px; font-weight: 600; color: var(--g500);
  letter-spacing: .5px; text-transform: uppercase; margin-top: 4px; }

/* ── Modal ── */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(74,76,77,.45);
  z-index: 500; display: flex; align-items: flex-start; justify-content: center;
  padding: 32px 16px; overflow-y: auto;
}
.modal {
  background: #fff; border-radius: var(--rlg); width: 100%; max-width: 760px;
  box-shadow: var(--sh-lg); border: 1px solid var(--g200);
  animation: mopen .18s ease-out; overflow: hidden;
}
@keyframes mopen { from { opacity:0; transform: translateY(-12px); } to { opacity:1; transform: none; } }
.modal-head {
  padding: 20px 26px 16px; border-bottom: 1px solid var(--g100);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 { font-size: 16px; font-weight: 700; color: var(--g900); }
.modal-body { padding: 22px 26px; }
.modal-foot {
  padding: 14px 26px; border-top: 1px solid var(--g100);
  display: flex; justify-content: flex-end; gap: 10px;
}
.close-btn {
  background: none; border: none; cursor: pointer; color: var(--g500);
  font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px;
  transition: color .15s;
}
.close-btn:hover { color: var(--g900); }

/* ── Form grid ── */
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; width: 100%; }
.fg.fg1 { grid-template-columns: 1fr; }
.fg.fg3 { grid-template-columns: 1fr 1fr 1fr; }
.fg .span2 { grid-column: span 2; }
.fg .span3 { grid-column: span 3; }
.fgroup { display: flex; flex-direction: column; gap: 5px; }
.fgroup label {
  font-size: 11px; font-weight: 700; color: var(--g500);
  letter-spacing: .7px; text-transform: uppercase;
}
.fgroup input, .fgroup select, .fgroup textarea {
  padding: 8px 11px; border: 1.5px solid var(--g200); border-radius: var(--rsm);
  font-family: 'Raleway', sans-serif; font-size: 13px; color: var(--g900);
  background: var(--g50); outline: none; transition: border-color .2s;
}
.fgroup input:focus, .fgroup select:focus, .fgroup textarea:focus { border-color: var(--verde); background: #fff; }
.fgroup textarea { min-height: 90px; resize: vertical; }
.fgroup .check-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.fgroup .check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--verde); }
.fgroup .check-row label { text-transform: none; letter-spacing: 0; font-size: 13px; font-weight: 500; color: var(--g700); }

/* ── Dettaglio record ── */
.det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.det-item { }
.det-item .dl { font-size: 10px; font-weight: 700; letter-spacing: .7px;
  text-transform: uppercase; color: var(--g500); margin-bottom: 3px; }
.det-item .dv { font-size: 13px; color: var(--g900); font-weight: 500; }
.det-item.span2 { grid-column: span 2; }
.det-desc {
  background: var(--g50); border: 1px solid var(--g200); border-radius: var(--rsm);
  padding: 12px 14px; font-size: 12.5px; color: var(--g700); line-height: 1.6;
}
.det-section-title {
  font-size: 10.5px; font-weight: 700; color: var(--verde);
  letter-spacing: 1px; text-transform: uppercase;
  border-bottom: 1.5px solid var(--blue-light); padding-bottom: 6px;
  margin: 18px 0 12px;
}


/* ── Multi-select diagnosi ── */
.ms-wrap {
  border: 1.5px solid var(--g200); border-radius: var(--rsm);
  background: var(--g50); max-height: 140px; overflow-y: auto; padding: 4px 0;
}
.ms-wrap label {
  display: flex; align-items: center; gap: 8px; padding: 5px 11px;
  font-size: 13px; color: var(--g700); cursor: pointer; transition: background .12s;
  text-transform: none; letter-spacing: 0; font-weight: 400;
}
.ms-wrap label:hover { background: var(--g100); }
.ms-wrap input[type=checkbox] { width:14px; height:14px; accent-color: var(--verde); flex-shrink:0; }

/* ── Loader ── */
.loader { text-align: center; padding: 48px; color: var(--g500); font-size: 13px; }

/* ── Paginazione ── */
.pag-bar { display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-top: 1px solid var(--g100); }
.pag-info { font-size: 12px; color: var(--g500); }
.pag-btns { display: flex; gap: 6px; }
.pag-btn {
  padding: 5px 12px; border-radius: var(--rsm); border: 1.5px solid var(--g200);
  background: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
  color: var(--g700); font-family: 'Raleway', sans-serif; transition: all .15s;
}
.pag-btn:hover:not(:disabled) { border-color: var(--verde); color: var(--verde); }
.pag-btn:disabled { opacity: .4; cursor: default; }
.pag-btn.active { background: var(--verde); color: #fff; border-color: var(--verde); }

/* ── Confirm dialog ── */
#conf-overlay {
  position: fixed; inset: 0; background: rgba(74,76,77,.5);
  z-index: 600; display: flex; align-items: center; justify-content: center;
}
.conf-box {
  background: #fff; border-radius: var(--r); padding: 28px 32px;
  max-width: 380px; width: 100%; box-shadow: var(--sh-lg); text-align: center;
}
.conf-box p { font-size: 14px; color: var(--g700); margin: 10px 0 22px; }
.conf-box .conf-btns { display: flex; gap: 10px; justify-content: center; }

/* ── Lookup tab ── */
.lookup-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-bottom: 1px solid var(--g100); font-size: 13px;
}
.lookup-row:last-child { border-bottom: none; }
.lookup-row:hover { background: var(--g50); }

/* Nascosto */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Login -->
<div id="lp">
  <div class="lcard">
    <div id="login-logo"></div>
    <div style="margin-top:14px;font-size:13px;color:var(--grigio);text-align:center">Accesso riservato al personale autorizzato</div>
    <div id="lerr" class="lerr"></div>
    <div class="lfield" style="margin-top:12px;"><label>E-Mail</label><input type="email" id="l-email" placeholder="nome@medicalgroup.it" autocomplete="username"/></div>
    <div class="lfield"><label>Password</label><input type="password" id="l-pwd" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="lbtn" id="lbtn-login" onclick="doLogin()">Accedi</button>
    <div id="login-ver" style="margin-top:14px;font-size:10px;color:var(--grigio-chiaro);text-align:center;letter-spacing:.5px;"></div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div id="topbar">
    <div id="tb-top">
      <div id="tb-logo"></div>
      <div id="tb-right">
        <span id="tb-date"></span>
        <span id="tb-user"></span>
        <span id="tb-role"></span>
        <button id="lout" onclick="doLogout()">Esci</button>
      </div>
    </div>
    <nav id="tb-nav"></nav>
  </div>
  <main id="main">
    <div id="pb"></div>
  </main>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden" onclick="if(event.target===this)closeM()">
  <div class="modal" id="modal-box"></div>
</div>

<!-- Confirm -->
<div id="conf-overlay" class="hidden">
  <div class="conf-box">
    <div style="font-size:28px">⚠️</div>
    <p id="conf-msg">Confermi l'operazione?</p>
    <div class="conf-btns">
      <button class="btn btn-secondary" onclick="closeConf()">Annulla</button>
      <button class="btn btn-danger" id="conf-ok">Conferma</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CFG = {
  URL: 'https://iczsdqcnvauopwkuspti.supabase.co',
  KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljenNkcWNudmF1b3B3a3VzcHRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTQ0MjMsImV4cCI6MjA5MjQzMDQyM30.SmcRHPLM2PEq4Hn-5CQhMyQKoz0PN_0lbN_X3l9MNUE',
  FN:  'https://iczsdqcnvauopwkuspti.supabase.co/functions/v1',
};
const T = n => `regint_${n}`;

// ═══════════════════════════════════════════════════════════════
// STATO GLOBALE
// ═══════════════════════════════════════════════════════════════
const S = { profili_list: [],
  user: null, token: null,
  page: 'registro',
  // dati
  interventi: [],
  operatori: [], secondi: [], anestesisti: [], infermieri: [],
  diagnosi: [], tipiAnestesia: [], tipiIntervento: [], matProt: [], descrizioni: [],
  // filtri & paginazione
  filters: { search: '', operatore: '', data_from: '', data_to: '', tipo: '' },
  page_n: 1, page_size: 25,
};

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const p2 = n => String(n).padStart(2,'0');
function fmt(d) {
  if (!d) return '—';
  const dt = typeof d === 'string' ? new Date(d.length === 10 ? d+'T00:00:00' : d) : d;
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function fmtTime(d) {
  if (!d) return '—';
  const dt = typeof d === 'string' ? new Date(d) : d;
  if (isNaN(dt)) return '—';
  return `${p2(dt.getHours())}:${p2(dt.getMinutes())}`;
}
function dateToStr(d) {
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
let _tid;
function toast(msg, type='ok') {
  const el = $('toast'); clearTimeout(_tid);
  el.textContent = msg;
  el.className = `show t${type}`;
  _tid = setTimeout(() => el.className='', 3000);
}
function fmtNumero(r) {
  if (!r.numero) return '—';
  // estrae anno da data_intervento (es. 2026-03-25 → 2026)
  const anno = r.data_intervento ? r.data_intervento.substring(0,4) : (r.anno ? r.anno.replace(/\D/g,'') : '');
  return anno ? `${r.numero}/${anno}` : String(r.numero);
}
function fmtOcchio(dx, sx) {
  if (dx && sx) return '<span class="badge badge-bi">Binoculare</span>';
  if (dx) return '<span class="badge badge-dx">OD</span>';
  if (sx) return '<span class="badge badge-sx">OS</span>';
  return '<span style="color:var(--g500)">—</span>';
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE REST
// ═══════════════════════════════════════════════════════════════
async function db(method, table, opts = {}) {
  const { flt='', body=null, sel='*', ord='', lim='' } = opts;
  let url = `${CFG.URL}/rest/v1/${table}?select=${sel}`;
  if (flt) url += `&${flt}`;
  if (ord) url += `&order=${ord}`;
  if (lim) url += `&limit=${lim}`;
  const headers = {
    'apikey': CFG.KEY,
    'Authorization': `Bearer ${S.token || CFG.KEY}`,
    'Content-Type': 'application/json',
    'Prefer': (method === 'GET') ? 'count=exact' : (method === 'DELETE' ? '' : 'return=representation'),
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (!res.ok) { const e = await res.text(); throw new Error(`${method} ${table}: ${e}`); }
  if (method === 'DELETE' || res.status === 204) return null;
  const text = await res.text();
  if (!text) return null;
  const data = JSON.parse(text);
  if (method === 'GET') {
    const ct = res.headers.get('Content-Range');
    const total = ct ? parseInt(ct.split('/')[1]) : (Array.isArray(data) ? data.length : 0);
    return { data, total };
  }
  return data;
}

async function dbGet(table, opts = {}) {
  const r = await db('GET', table, opts);
  return r.data;
}

async function supaLogin(email, password) {
  const res = await fetch(`${CFG.URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': CFG.KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || 'Login fallito');
  return data;
}

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
async function doLogin() {
  const email = $('l-email').value.trim();
  const pwd   = $('l-pwd').value;
  const err=$('lerr'),btn=$('lbtn-login');
  err.style.display='none';
  if(!email||!pwd){err.textContent='Inserisci email e password.';err.style.display='block';return;}
  btn.textContent='Accesso…';btn.disabled=true;
  try {
    const data = await supaLogin(email, pwd);
    S.token = data.access_token;
    S.user  = data.user;
    const rows=await dbGet(T('profili'),{flt:`id=eq.${S.user.id}`,sel:'ruolo,nome,cognome,attivo'});
    if(!rows||!rows[0]) throw new Error('Profilo non trovato. Contatta l\'amministratore.');
    if(rows[0].attivo===false) throw new Error('Utente disabilitato. Contatta l\'amministratore.');
    S.user.ruolo=rows[0].ruolo;
    S.user.nome_display=`${rows[0].nome||''} ${rows[0].cognome||''}`.trim()||S.user.email;
    await loadLookup();
    showApp();
  } catch(e) {
    err.textContent=e.message||'Credenziali non valide.';err.style.display='block';
    btn.textContent='Accedi';btn.disabled=false;
  }
}

function doLogout() {
  S.token = null; S.user = null;
  $('app').classList.add('hidden');
  $('lp').classList.remove('hidden');
  $('l-pwd').value = '';
}

function logoSVG(small) {
  const w = small ? 28 : 36, h = small ? 22 : 28;
  return `<svg width="${w}" height="${h}" viewBox="0 0 90 70" fill="none">
    <circle cx="28" cy="22" r="19" stroke="#D5E3B7" stroke-width="3.5" fill="none"/>
    <circle cx="40" cy="38" r="24" stroke="#77797A" stroke-width="3.5" fill="none"/>
  </svg>`;
}
function logoHTML(small=false) {
  return `<div style="display:flex;align-items:center;gap:${small?6:10}px;">
    ${logoSVG(small)}
    <div style="line-height:1.15;">
      <div style="font-weight:300;font-size:${small?11:14}px;letter-spacing:4px;text-transform:uppercase;">
        <span style="color:var(--grigio);">MEDICAL</span><span style="color:var(--verde);">GROUP</span>
      </div>
      <div style="font-size:9px;letter-spacing:2px;color:var(--grigio-chiaro);text-transform:uppercase;font-weight:500;">
        Registro Interventi
      </div>
    </div>
  </div>`;
}
document.addEventListener('DOMContentLoaded', async () => {
  const tl = $('tb-logo'); if (tl) tl.innerHTML = logoHTML(true);
  const ll = $('login-logo'); if (ll) ll.innerHTML = logoHTML(false);
  fetchBuildVersion();
});

async function fetchBuildVersion(retry = 0) {
  const verEl = $('login-ver');
  if (!verEl) return;
  try {
    const repo = 'ictmedicalgroup-sudo/registro-interventi';
    const res = await fetch(`https://api.github.com/repos/${repo}/commits?per_page=1`, {
      cache: 'no-store',
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) {
      const data = await res.json();
      if (data && data[0]) {
        const d = new Date(data[0].commit.committer.date);
        verEl.textContent = `build ${d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})} ${d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
        return;
      }
    }
    // Rate limit o repo non ancora con commit: riprova dopo 3s (max 2 volte)
    if (retry < 2) setTimeout(() => fetchBuildVersion(retry + 1), 3000);
    else verEl.textContent = '';
  } catch(e) {
    if (retry < 2) setTimeout(() => fetchBuildVersion(retry + 1), 3000);
    else verEl.textContent = '';
  }
}

async function loadLookup() {
  const [op1, sec, ane, inf, diag, tan, tint, mat, desc] = await Promise.all([
    dbGet(T('op1'), { ord: 'nome.asc' }),
    dbGet(T('secondi'), { ord: 'nome.asc' }),
    dbGet(T('anestesisti'), { ord: 'nome.asc' }),
    dbGet(T('infermieri'), { ord: 'nome.asc' }),
    dbGet(T('diagnosi'), { ord: 'nome.asc' }),
    dbGet(T('tipo_anestesia'), { ord: 'nome.asc' }),
    dbGet(T('tipo_intervento'), { ord: 'nome.asc' }),
    dbGet(T('materiale_protesico'), { ord: 'nome.asc' }),
    dbGet(T('descrizioni'), { ord: 'codice.asc' }),
  ]);
  S.operatori   = op1   || [];
  S.secondi     = sec   || [];
  S.anestesisti = ane   || [];
  S.infermieri  = inf   || [];
  S.diagnosi    = diag  || [];
  S.tipiAnestesia   = tan  || [];
  S.tipiIntervento  = tint || [];
  S.matProt     = mat   || [];
  S.descrizioni = desc  || [];
}

async function loadInterventi() {
  const f = S.filters;
  let flt = '';
  if (f.operatore)  flt += `&primo_operatore=eq.${encodeURIComponent(f.operatore)}`;
  if (f.data_from)  flt += `&data_intervento=gte.${f.data_from}`;
  if (f.data_to)    flt += `&data_intervento=lte.${f.data_to}`;
  if (f.tipo)       flt += `&tipo_intervento=eq.${encodeURIComponent(f.tipo)}`;
  if (flt.startsWith('&')) flt = flt.slice(1);

  const offset = (S.page_n - 1) * S.page_size;
  let url = `${CFG.URL}/rest/v1/${T('interventi')}?select=*`;
  if (flt) url += `&${flt}`;
  if (f.search) url += `&cognomenome=ilike.*${encodeURIComponent(f.search)}*`;
  url += `&order=data_intervento.desc.nullslast,numero.desc.nullslast`;
  url += `&limit=${S.page_size}&offset=${offset}`;

  const headers = {
    'apikey': CFG.KEY,
    'Authorization': `Bearer ${S.token || CFG.KEY}`,
    'Prefer': 'count=exact',
  };
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(await res.text());
  const data = await res.json();
  const ct   = res.headers.get('Content-Range');
  const total = ct ? parseInt(ct.split('/')[1]) : data.length;
  S.interventi = data;
  return total;
}

async function loadStats() {
  try {
    const res = await fetch(`${CFG.URL}/rest/v1/${T('interventi')}?select=id&limit=1`, {
      headers: { 'apikey': CFG.KEY, 'Authorization': `Bearer ${S.token||CFG.KEY}`, 'Prefer': 'count=exact' }
    });
    const ct = res.headers.get('Content-Range');
    const tot = ct ? parseInt(ct.split('/')[1]) : 0;
    // anno corrente
    const anno = new Date().getFullYear();
    const res2 = await fetch(`${CFG.URL}/rest/v1/${T('interventi')}?select=id&data_intervento=gte.${anno}-01-01&data_intervento=lte.${anno}-12-31&limit=1`, {
      headers: { 'apikey': CFG.KEY, 'Authorization': `Bearer ${S.token||CFG.KEY}`, 'Prefer': 'count=exact' }
    });
    const ct2 = res2.headers.get('Content-Range');
    const tot_anno = ct2 ? parseInt(ct2.split('/')[1]) : 0;
    $('stats-area').innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="sv">${tot}</div><div class="sl">Interventi totali</div></div>
        <div class="stat-card"><div class="sv">${tot_anno}</div><div class="sl">Interventi ${anno}</div></div>
        <div class="stat-card"><div class="sv">${S.operatori.length}</div><div class="sl">Operatori</div></div>
      </div>`;
  } catch(e) { if($('stats-area')) $('stats-area').innerHTML=''; }
}

// Stampa PDF singolo intervento (report R_REGISTRO per una riga)
function printSingoloIntervento(id) {
  const r = S.interventi.find(x=>x.id===id);
  if (!r) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const PW   = 210;   // larghezza A4
  const PH   = 297;   // altezza A4
  const ML   = 16;    // margine sx
  const MR   = 16;    // margine dx
  const MT   = 14;    // margine top
  const CW   = PW - ML - MR;  // larghezza utile
  const VERDE   = [157, 191, 96];
  const GRIGIO  = [119, 121, 122];
  const NAVY    = [74,  76,  77];
  const LGRAY   = [226, 230, 223];
  const BGRAY   = [248, 249, 248];

  let y = MT;

  // ── helpers ──────────────────────────────────────────────────
  function lbl(text, x, yy, w) {
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.setTextColor(...GRIGIO);
    doc.text(text.toUpperCase(), x, yy);
  }
  function val(text, x, yy, w, opts={}) {
    doc.setFontSize(9.5); doc.setFont('helvetica', opts.bold?'bold':'normal');
    doc.setTextColor(...NAVY);
    const lines = doc.splitTextToSize(String(text||'—'), w);
    doc.text(lines, x, yy + 4);
    const h = lines.length * 4;
    doc.setDrawColor(...LGRAY);
    doc.line(x, yy + h + 2, x + w, yy + h + 2);
    return h + 5;
  }
  function section(text, yy) {
    doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.setTextColor(...VERDE);
    doc.text(text.toUpperCase(), ML, yy);
    doc.setDrawColor(...VERDE);
    doc.setLineWidth(0.4);
    doc.line(ML, yy + 1.5, ML + CW, yy + 1.5);
    doc.setLineWidth(0.2);
    return yy + 6;
  }
  function grid3(items, yy) {
    const W = (CW - 6) / 3;
    let maxH = 0;
    items.forEach((item, i) => {
      const x = ML + i * (W + 3);
      lbl(item[0], x, yy, W);
      const h = val(item[1], x, yy, W);
      if (h > maxH) maxH = h;
    });
    return yy + maxH + 4;
  }
  function grid2(items, yy) {
    const W = (CW - 4) / 2;
    let maxH = 0;
    items.forEach((item, i) => {
      const x = ML + i * (W + 4);
      lbl(item[0], x, yy, W);
      const h = val(item[1], x, yy, W);
      if (h > maxH) maxH = h;
    });
    return yy + maxH + 4;
  }
  function full(labelTxt, valueTxt, yy) {
    lbl(labelTxt, ML, yy, CW);
    const h = val(valueTxt, ML, yy, CW);
    return yy + h + 4;
  }
  function descBox(text, yy) {
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    // innerW in pt (jsPDF splitTextToSize vuole pt quando unit=mm)
    const mmToPt = 2.8346;
    const innerW = (CW - 8) * mmToPt;
    const lines  = doc.splitTextToSize(String(text||''), innerW);
    // altezza per riga: fontSize/pt * fattore interlinea (1.35) / mmToPt
    const lineH  = (9 * 1.35) / mmToPt;
    const PAD    = 8;   // padding top+bottom
    const bh     = Math.max(lines.length * lineH + PAD, 20);
    doc.setFillColor(...BGRAY);
    doc.setDrawColor(...LGRAY);
    doc.roundedRect(ML, yy, CW, bh, 2, 2, 'FD');
    doc.setTextColor(...NAVY);
    doc.text(lines, ML + 4, yy + 5);
    return yy + bh + 5;
  }
  function firmaBox(yy) {
    lbl('Firma Primo Operatore', ML, yy, CW/2);
    const bh = 18;
    doc.setDrawColor(...NAVY);
    doc.setLineWidth(0.3);
    doc.line(ML, yy + bh, ML + CW/2, yy + bh);
    if (r.firma_operatore) {
      doc.setFontSize(9); doc.setFont('helvetica','italic');
      doc.setTextColor(...NAVY);
      doc.text(r.firma_operatore, ML, yy + bh - 2);
    }
    return yy + bh + 5;
  }
  function newPageIfNeeded(needed) {
    if (y + needed > PH - 14) {
      doc.addPage();
      y = MT;
    }
  }

  // ── HEADER ────────────────────────────────────────────────────
  // Logo MEDICALGROUP
  doc.setFontSize(14); doc.setFont('helvetica','light');
  doc.setTextColor(...GRIGIO);
  doc.text('MEDICAL', ML, y + 5);
  const mw = doc.getTextWidth('MEDICAL');
  doc.setTextColor(...VERDE);
  doc.text('GROUP', ML + mw, y + 5);
  doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.setTextColor(170,170,170);
  doc.text('REGISTRO INTERVENTI CHIRURGICI', ML, y + 9);

  // Progressivo a destra
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.setTextColor(...NAVY);
  const progTxt = 'Progressivo Intervento ' + fmtNumero(r);
  doc.text(progTxt, PW - MR, y + 5, { align: 'right' });
  doc.setFontSize(8.5); doc.setFont('helvetica','normal');
  doc.setTextColor(...GRIGIO);
  doc.text('Data: ' + fmt(r.data_intervento), PW - MR, y + 9.5, { align: 'right' });

  // Cartella clinica
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.setTextColor(...GRIGIO);
  doc.text('CARTELLA CLINICA N°', PW - MR - 42, y + 14.5);
  doc.setDrawColor(...NAVY);
  doc.setLineWidth(0.3);
  doc.line(PW - MR - 42, y + 16, PW - MR, y + 16);

  // Linea verde sotto header
  doc.setDrawColor(...VERDE);
  doc.setLineWidth(0.8);
  doc.line(ML, y + 18, ML + CW, y + 18);
  doc.setLineWidth(0.2);
  y += 24;

  // ── PAZIENTE ──────────────────────────────────────────────────
  const occhioExt = [r.occhio_dx?'Occhio Destro':null, r.occhio_sx?'Occhio Sinistro':null].filter(Boolean).join(' / ') || '—';
  y = section('Paziente', y);
  y = grid3([
    ['Cognome e Nome', r.cognomenome||''],
    ['Data di Nascita', fmt(r.data_nascita)],
    ['Intervento Eseguito in', occhioExt],
  ], y);

  // ── ÉQUIPE ────────────────────────────────────────────────────
  newPageIfNeeded(28);
  y = section('Équipe', y);
  y = grid2([
    ['Primo Operatore',                r.primo_operatore||''],
    ['Secondo Operatore / Strumentista', r.secondo_operatore||''],
  ], y);
  y = grid2([
    ['Anestesista', r.anestesista||''],
    ['Infermiere',  r.infermiere||''],
  ], y);

  // ── INTERVENTO ────────────────────────────────────────────────
  newPageIfNeeded(36);
  y = section('Intervento', y);
  y = full('Diagnosi',       r.diagnosi||'', y);
  y = full('Tipo Anestesia', r.tipo_anestesia||'', y);
  y = full('Tipo Intervento', r.tipo_intervento||'', y);
  y = full('Protesi e Materiali', r.materiale_protesico||'', y);

  // ── DESCRIZIONE ───────────────────────────────────────────────
  newPageIfNeeded(30);
  y = section('Descrizione Intervento', y);
  y = descBox(r.descrizione||'', y);

  // ── ORARI ─────────────────────────────────────────────────────
  newPageIfNeeded(28);
  y = section('Orari Sala Operatoria', y);
  y = grid3([
    ['Ingresso Sala Operatoria', r.ora_ingresso||'—'],
    ['Inizio Anestesia',         r.ora_inizio_anestesia||'—'],
    ['Inizio Intervento',        r.ora_inizio_chirurgia||'—'],
  ], y);
  y = grid3([
    ['Fine Intervento',          r.ora_fine_chirurgia||'—'],
    ['Fine Anestesia',           r.ora_fine_anestesia||'—'],
    ['Uscita Sala Operatoria',   r.ora_uscita||'—'],
  ], y);

  // ── FIRMA ─────────────────────────────────────────────────────
  newPageIfNeeded(28);
  y = section('Firma', y);
  y = firmaBox(y);

  // ── FOOTER ────────────────────────────────────────────────────
  const now = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const pages = doc.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setFontSize(7.5); doc.setFont('helvetica','normal');
    doc.setTextColor(170,170,170);
    doc.setDrawColor(...LGRAY);
    doc.line(ML, PH - 10, ML + CW, PH - 10);
    doc.text(`Medical Group — Registro Interventi Chirurgici — ${now}`, ML, PH - 6);
    if (pages > 1) doc.text(`Pag. ${i}/${pages}`, PW - MR, PH - 6, { align: 'right' });
  }

  // ── DOWNLOAD ──────────────────────────────────────────────────
  const fname = `intervento_${fmtNumero(r).replace('/','_')}_${(r.cognomenome||'paziente').replace(/\s+/g,'_').toLowerCase()}.pdf`;
  doc.save(fname);
}

function buildForm(r = {}) {
  const selOp  = opts => S.operatori.map(o=>`<option value="${esc(o.nome)}"${r[opts]===o.nome?' selected':''}>${esc(o.nome)}</option>`).join('');
  const selSec = S.secondi.map(o=>`<option value="${esc(o.nome)}"${r.secondo_operatore===o.nome?' selected':''}>${esc(o.nome)}</option>`).join('');
  const selAne = S.anestesisti.map(o=>`<option value="${esc(o.nome)}"${r.anestesista===o.nome?' selected':''}>${esc(o.nome)}</option>`).join('');
  const selInf = S.infermieri.map(o=>`<option value="${esc(o.nome)}"${r.infermiere===o.nome?' selected':''}>${esc(o.nome)}</option>`).join('');
  const selTAn = S.tipiAnestesia.map(o=>`<option value="${esc(o.nome)}"${r.tipo_anestesia===o.nome?' selected':''}>${esc(o.nome)}</option>`).join('');
  const selTIn = S.tipiIntervento.map(o=>`<option value="${esc(o.nome)}"${r.tipo_intervento===o.nome?' selected':''}>${esc(o.nome)}</option>`).join('');
  const selMat = S.matProt.map(o=>`<option value="${esc(o.nome)}"${r.materiale_protesico===o.nome?' selected':''}>${esc(o.nome)}</option>`).join('');
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:14px 18px;margin-bottom:14px;width:100%">
      <div class="fgroup">
        <label>Progressivo</label>
        <input id="f-numero" type="number" value="${r._nextNum || r.numero || ''}" readonly style="background:var(--g100);color:var(--g500)">
      </div>
      <div class="fgroup">
        <label>Anno</label>
        <input id="f-anno" type="text" value="${r._anno || (r.data_intervento ? r.data_intervento.substring(0,4) : new Date().getFullYear())}" readonly style="background:var(--g100);color:var(--g500)">
      </div>
      <div class="fgroup">
        <label>Data intervento</label>
        <input id="f-data" type="date" value="${r.data_intervento || r._today || dateToStr(new Date())}" ${r.id ? 'readonly style="background:var(--g100);color:var(--g500)"' : ''}>
      </div>
    </div>
    <div class="fg">
      <div class="fgroup span2">
        <label>Cognome e Nome paziente</label>
        <input id="f-cognome" value="${esc(r.cognomenome||'')}">
      </div>
      <div class="fgroup">
        <label>Data di nascita</label>
        <input id="f-dnascita" type="date" value="${r.data_nascita||''}">
      </div>
      <div class="fgroup">
        <label>N° Cartella Clinica</label>
        <input id="f-cart" value="${esc(r.numero_cart_cli||'')}">
      </div>
      <div class="fgroup">
        <label>Occhio</label>
        <div class="check-row"><input type="checkbox" id="f-odx" ${r.occhio_dx?'checked':''}><label for="f-odx">Occhio Destro (OD)</label></div>
        <div class="check-row"><input type="checkbox" id="f-osx" ${r.occhio_sx?'checked':''}><label for="f-osx">Occhio Sinistro (OS)</label></div>
      </div>
      <div class="fgroup">
        <label>Primo Operatore</label>
        <select id="f-op1"><option value="">— seleziona —</option>${selOp('primo_operatore')}</select>
      </div>
      <div class="fgroup">
        <label>Secondo Op./Strumentista</label>
        <select id="f-op2"><option value="">— seleziona —</option>${selSec}</select>
      </div>
      <div class="fgroup">
        <label>Anestesista</label>
        <select id="f-ane"><option value="">— seleziona —</option>${selAne}</select>
      </div>
      <div class="fgroup">
        <label>Infermiere</label>
        <select id="f-inf"><option value="">— seleziona —</option>${selInf}</select>
      </div>
      <div class="fgroup span2">
        <label>Diagnosi <span style="color:var(--g500);font-weight:400;text-transform:none;letter-spacing:0">(selezione multipla)</span></label>
        <div class="ms-wrap" id="f-diag-wrap">
          ${S.diagnosi.map(o=>{
            const curDiag = Array.isArray(r.diagnosi_list) ? r.diagnosi_list :
                            (r.diagnosi||'').split(',').map(s=>s.trim()).filter(Boolean);
            const chk = curDiag.includes(o.nome) ? 'checked' : '';
            return `<label><input type="checkbox" class="f-diag-cb" value="${esc(o.nome)}" ${chk}>${esc(o.nome)}</label>`;
          }).join('')}
        </div>
      </div>
      <div class="fgroup">
        <label>Tipo Anestesia</label>
        <select id="f-tane"><option value="">— seleziona —</option>${selTAn}</select>
      </div>
      <div class="fgroup span2">
        <label>Tipo Intervento</label>
        <select id="f-tint"><option value="">— seleziona —</option>${selTIn}</select>
      </div>
      <div class="fgroup span2">
        <label>Materiale / Protesi</label>
        <select id="f-mat"><option value="">— nessuno —</option>${selMat}</select>
      </div>
      <div class="fgroup span2">
        <label>Descrizione operatoria <span style="color:var(--g500);font-weight:400;text-transform:none">(o scegli template)</span></label>
        <select onchange="if(this.value){$('f-desc').value=this.value;this.value=''}">
          <option value="">— inserisci testo o scegli template —</option>
          ${S.descrizioni.map(d=>`<option value="${esc(d.testo)}">${esc(d.codice)}</option>`).join('')}
        </select>
        <textarea id="f-desc" style="margin-top:6px">${esc(r.descrizione||'')}</textarea>
      </div>
    </div>
    <div class="det-section-title" style="margin-top:20px">Orari sala operatoria</div>
    <div class="fg fg3">
      <div class="fgroup">
        <label>Ingresso sala operatoria</label>
        <input id="f-ora-ing" type="time" value="${r.ora_ingresso||''}">
      </div>
      <div class="fgroup">
        <label>Inizio anestesia</label>
        <input id="f-ora-ian" type="time" value="${r.ora_inizio_anestesia||''}">
      </div>
      <div class="fgroup">
        <label>Inizio intervento</label>
        <input id="f-ora-ich" type="time" value="${r.ora_inizio_chirurgia||''}">
      </div>
      <div class="fgroup">
        <label>Fine intervento</label>
        <input id="f-ora-fch" type="time" value="${r.ora_fine_chirurgia||''}">
      </div>
      <div class="fgroup">
        <label>Fine anestesia</label>
        <input id="f-ora-fan" type="time" value="${r.ora_fine_anestesia||''}">
      </div>
      <div class="fgroup">
        <label>Uscita sala operatoria</label>
        <input id="f-ora-usc" type="time" value="${r.ora_uscita||''}">
      </div>
    </div>`;
}

function collectForm() {
  return {
    numero:               parseInt($('f-numero').value) || null,
    data_intervento:      $('f-data').value || null,
    cognomenome:          $('f-cognome').value.trim() || null,
    data_nascita:         $('f-dnascita').value || null,
    numero_cart_cli:      $('f-cart').value.trim() || null,
    occhio_dx:            $('f-odx').checked,
    occhio_sx:            $('f-osx').checked,
    primo_operatore:      $('f-op1').value || null,
    secondo_operatore:    $('f-op2').value || null,
    anestesista:          $('f-ane').value || null,
    infermiere:           $('f-inf').value || null,
    diagnosi:             Array.from(document.querySelectorAll('.f-diag-cb:checked')).map(cb=>cb.value).join(', ') || null,
    tipo_anestesia:       $('f-tane').value || null,
    tipo_intervento:      $('f-tint').value || null,
    materiale_protesico:  $('f-mat').value || null,
    descrizione:          $('f-desc').value.trim() || null,
    ora_ingresso:         $('f-ora-ing').value || null,
    ora_inizio_anestesia: $('f-ora-ian').value || null,
    ora_inizio_chirurgia: $('f-ora-ich').value || null,
    ora_fine_chirurgia:   $('f-ora-fch').value || null,
    ora_fine_anestesia:   $('f-ora-fan').value || null,
    ora_uscita:           $('f-ora-usc').value || null,
  };
}

async function openNuovo() {
  // Calcola prossimo numero progressivo per l'anno corrente
  const anno = new Date().getFullYear();
  let nextNum = 1;
  try {
    const res = await fetch(
      `${CFG.URL}/rest/v1/${T('interventi')}?select=numero&data_intervento=gte.${anno}-01-01&data_intervento=lte.${anno}-12-31&order=numero.desc.nullslast&limit=1`,
      { headers: { 'apikey': CFG.KEY, 'Authorization': `Bearer ${S.token||CFG.KEY}` } }
    );
    const rows = await res.json();
    if (rows && rows[0] && rows[0].numero) nextNum = rows[0].numero + 1;
  } catch(e) { /* usa 1 come fallback */ }
  openM(`
    <div class="modal-head">
      <h3>Nuovo Intervento</h3>
      <button class="close-btn" onclick="closeM()">✕</button>
    </div>
    <div class="modal-body">${buildForm({ _nextNum: nextNum, _anno: anno, _today: dateToStr(new Date()) })}</div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeM()">Annulla</button>
      <button class="btn btn-primary" onclick="saveNuovo()">💾 Salva</button>
    </div>`);
}

async function saveNuovo() {
  const body = collectForm();
  if (!body.cognomenome) { toast('Inserisci il nome del paziente','err'); return; }
  try {
    await db('POST', T('interventi'), { body });
    closeM(); toast('Intervento salvato'); renderRegistro();
  } catch(e) { toast('Errore: ' + e.message, 'err'); }
}

async function openEdit(id) {
  const r = S.interventi.find(x=>x.id===id);
  if (!r) return;
  openM(`
    <div class="modal-head">
      <h3>Modifica Intervento ${fmtNumero(r)} — ${esc(r.cognomenome||'')}</h3>
      <button class="close-btn" onclick="closeM()">✕</button>
    </div>
    <div class="modal-body">${buildForm(r)}</div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeM()">Annulla</button>
      <button class="btn btn-primary" onclick="saveEdit(${id})">💾 Salva modifiche</button>
    </div>`);
}

async function saveEdit(id) {
  const body = collectForm();
  try {
    await db('PATCH', T('interventi'), { flt: `id=eq.${id}`, body });
    closeM(); toast('Modifiche salvate'); renderRegistro();
  } catch(e) { toast('Errore: ' + e.message, 'err'); }
}

function confirmDel(id) {
  const r = S.interventi.find(x=>x.id===id);
  openConf(`Eliminare l'intervento di <strong>${esc(r?.cognomenome||'')}</strong>?`, async () => {
    try {
      await db('DELETE', T('interventi'), { flt: `id=eq.${id}` });
      toast('Intervento eliminato'); renderRegistro();
    } catch(e) { toast('Errore: '+e.message,'err'); }
  });
}

// ═══════════════════════════════════════════════════════════════
// EXPORT XLSX
// ═══════════════════════════════════════════════════════════════
async function exportXLSX() {
  toast('Generazione XLSX in corso…');
  try {
    const f = S.filters;
    let url = `${CFG.URL}/rest/v1/${T('interventi')}?select=*`;
    if (f.operatore) url += `&primo_operatore=eq.${encodeURIComponent(f.operatore)}`;
    if (f.data_from) url += `&data_intervento=gte.${f.data_from}`;
    if (f.data_to)   url += `&data_intervento=lte.${f.data_to}`;
    if (f.search)    url += `&cognomenome=ilike.*${encodeURIComponent(f.search)}*`;
    url += `&order=data_intervento.asc,numero.asc&limit=1000`;
    const res = await fetch(url, { headers: { 'apikey': CFG.KEY, 'Authorization': `Bearer ${S.token||CFG.KEY}` } });
    const rows = await res.json();

    // Costruisce CSV con BOM per Excel
    const cols = [
      ['N°',            r => fmtNumero(r)],
      ['Data',          r => fmt(r.data_intervento)],
      ['Paziente',      r => r.cognomenome||''],
      ['Data nascita',  r => fmt(r.data_nascita)],
      ['N° Cartella',   r => r.numero_cart_cli||''],
      ['Occhio',        r => r.occhio_dx&&r.occhio_sx?'OU':r.occhio_dx?'OD':r.occhio_sx?'OS':''],
      ['Operatore',     r => r.primo_operatore||''],
      ['Secondo Op.',   r => r.secondo_operatore||''],
      ['Anestesista',   r => r.anestesista||''],
      ['Infermiere',    r => r.infermiere||''],
      ['Diagnosi',      r => r.diagnosi||''],
      ['Tipo anestesia',r => r.tipo_anestesia||''],
      ['Tipo intervento',r => r.tipo_intervento||''],
      ['Materiale/IOL', r => r.materiale_protesico||''],
      ['Descrizione',   r => r.descrizione||''],
      ['Ora ingresso',  r => r.ora_ingresso||''],
      ['Inizio anest.', r => r.ora_inizio_anestesia||''],
      ['Inizio chir.',  r => r.ora_inizio_chirurgia||''],
      ['Fine chir.',    r => r.ora_fine_chirurgia||''],
      ['Fine anest.',   r => r.ora_fine_anestesia||''],
      ['Uscita sala',   r => r.ora_uscita||''],
      ['Firma',         r => r.firma_operatore||''],
    ];

    const csvCell = v => {
      const s = String(v).replace(/"/g,'""');
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
    };

    const header = cols.map(([label]) => csvCell(label)).join(',');
    const body   = rows.map(r => cols.map(([, fn]) => csvCell(fn(r))).join(',')).join('\n');
    const csv    = '\uFEFF' + header + '\n' + body;   // BOM per Excel

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    const today = new Date();
    const ds = `${today.getFullYear()}${p2(today.getMonth()+1)}${p2(today.getDate())}`;
    link.download = `registro_interventi_${ds}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    toast('XLSX esportato', 'ok');
  } catch(e) { toast('Errore XLSX: '+e.message, 'err'); }
}

async function exportPDF() {

    if (f.data_from) url += `&data_intervento=gte.${f.data_from}`;
    if (f.data_to)   url += `&data_intervento=lte.${f.data_to}`;
    if (f.search)    url += `&cognomenome=ilike.*${encodeURIComponent(f.search)}*`;

</head>
<body>

// ═══════════════════════════════════════════════════════════════
// ANAGRAFICHE (LOOKUP)
// ═══════════════════════════════════════════════════════════════
const LOOKUP_TABS = [
  { id: 'op1',              label: 'Operatori',      field: 'nome' },
  { id: 'secondi',          label: 'Sec. Op./Strum.', field: 'nome' },
  { id: 'anestesisti',      label: 'Anestesisti',     field: 'nome' },
  { id: 'infermieri',       label: 'Infermieri',      field: 'nome' },
  { id: 'diagnosi',         label: 'Diagnosi',        field: 'nome' },
  { id: 'tipo_anestesia',   label: 'Tipo Anestesia',  field: 'nome' },
  { id: 'tipo_intervento',  label: 'Tipo Intervento', field: 'nome' },
  { id: 'materiale_protesico', label: 'Mat./Protesi', field: 'nome' },
  { id: 'descrizioni',      label: 'Testi std.',      field: 'codice', extra: 'testo' },
];
let activeTab = 'op1';

async function renderLookup() {
  const pb = $('pb');
  pb.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Anagrafiche</div>
        <div class="page-subtitle">Gestione delle tabelle di riferimento</div>
      </div>
    </div>
    <div style="display:flex;gap:0;border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;background:#fff;box-shadow:var(--sh-sm);margin-bottom:20px;">
      ${LOOKUP_TABS.map(t=>`<button class="tnb${activeTab===t.id?' active':''}" style="border-radius:0;border-bottom:none;border-right:1px solid var(--g100);padding:0 14px;height:40px;" onclick="activeTab='${t.id}';renderLookup()">${t.label}</button>`).join('')}
    </div>
    <div id="lookup-content"><div class="loader">Caricamento…</div></div>`;
  
  const tab = LOOKUP_TABS.find(t=>t.id===activeTab);
  try {
    const rows = await dbGet(T(tab.id), { ord: `${tab.field}.asc` });
    renderLookupTab(tab, rows);
  } catch(e) {
    $('lookup-content').innerHTML = `<div class="loader">Errore: ${esc(e.message)}</div>`;
  }
}

function renderLookupTab(tab, rows) {
  const lc = $('lookup-content');
  lc.innerHTML = `
    <div class="table-wrap">
      <div style="padding:12px 16px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--g500)">${rows.length} voci</span>
        <button class="btn btn-primary btn-sm" onclick="openLookupNew('${tab.id}','${tab.field}','${tab.extra||''}')">+ Aggiungi</button>
      </div>
      ${rows.map(r=>`
        <div class="lookup-row">
          <div>
            <span style="font-weight:600">${esc(r[tab.field]||'')}</span>
            ${tab.extra ? `<div style="font-size:11px;color:var(--g500);margin-top:2px">${esc((r[tab.extra]||'').substring(0,80))}…</div>` : ''}
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-secondary btn-sm btn-icon" onclick='openLookupEdit(${JSON.stringify(tab)}, ${JSON.stringify(r)})'>✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="confirmLookupDel('${tab.id}',${r.id})">🗑</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function openLookupNew(tabId, field, extra) {
  openM(`
    <div class="modal-head"><h3>Nuova voce</h3><button class="close-btn" onclick="closeM()">✕</button></div>
    <div class="modal-body">
      <div class="fg fg1">
        <div class="fgroup"><label>${field}</label><input id="lk-field" autofocus></div>
        ${extra ? `<div class="fgroup"><label>${extra}</label><textarea id="lk-extra" style="min-height:120px"></textarea></div>` : ''}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeM()">Annulla</button>
      <button class="btn btn-primary" onclick="saveLookupNew('${tabId}','${field}','${extra}')">Salva</button>
    </div>`);
}
async function saveLookupNew(tabId, field, extra) {
  const body = { [field]: $('lk-field').value.trim() };
  if (extra && $('lk-extra')) body[extra] = $('lk-extra').value.trim();
  if (!body[field]) { toast('Campo obbligatorio','err'); return; }
  try {
    await db('POST', T(tabId), { body });
    await loadLookup();
    closeM(); toast('Voce aggiunta'); renderLookup();
  } catch(e) { toast('Errore: '+e.message,'err'); }
}

function openLookupEdit(tab, r) {
  openM(`
    <div class="modal-head"><h3>Modifica voce</h3><button class="close-btn" onclick="closeM()">✕</button></div>
    <div class="modal-body">
      <div class="fg fg1">
        <div class="fgroup"><label>${tab.field}</label><input id="lk-field" value="${esc(r[tab.field]||'')}"></div>
        ${tab.extra ? `<div class="fgroup"><label>${tab.extra}</label><textarea id="lk-extra" style="min-height:120px">${esc(r[tab.extra]||'')}</textarea></div>` : ''}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeM()">Annulla</button>
      <button class="btn btn-primary" onclick="saveLookupEdit('${tab.id}',${r.id},'${tab.field}','${tab.extra||''}')">Salva modifiche</button>
    </div>`);
}
async function saveLookupEdit(tabId, id, field, extra) {
  const body = { [field]: $('lk-field').value.trim() };
  if (extra && $('lk-extra')) body[extra] = $('lk-extra').value.trim();
  try {
    await db('PATCH', T(tabId), { flt: `id=eq.${id}`, body });
    await loadLookup();
    closeM(); toast('Modifiche salvate'); renderLookup();
  } catch(e) { toast('Errore: '+e.message,'err'); }
}
function confirmLookupDel(tabId, id) {
  openConf('Eliminare questa voce?', async () => {
    try {
      await db('DELETE', T(tabId), { flt: `id=eq.${id}` });
      await loadLookup();
      toast('Voce eliminata'); renderLookup();
    } catch(e) { toast('Errore: '+e.message,'err'); }
  });
}

// ═══════════════════════════════════════════════════════════════
// GESTIONE UTENTI (solo admin)
// ═══════════════════════════════════════════════════════════════

/* ── Check email live + avviso password cross-tool ── */
async function checkEmailLive(inputEl,infoEl,pwdWrap,fnName){
  const email=inputEl.value.trim();
  infoEl.style.display='none'; infoEl.dataset.exists='';
  if(!email||!email.includes('@')) return;
  // indicatore di caricamento
  infoEl.style.cssText='display:block;margin-top:6px;padding:6px 12px;font-size:12px;color:var(--g500)';
  infoEl.textContent='Verifica in corso\u2026';
  try{
    const res=await fetch(`${CFG.FN}/${fnName}`,{method:'POST',
      headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'},
      body:JSON.stringify({action:'check_email',email})});
    const data=await res.json();
    if(!data.ok){ infoEl.style.display='none'; return; }
    infoEl.dataset.exists=data.exists?'true':'false';
    if(data.exists){
      infoEl.style.cssText='display:block;margin-top:6px;padding:8px 12px;border-radius:var(--rsm);background:#EEF5E3;border:1px solid #9DBF60;font-size:12px;color:#2e6e1a;font-weight:600';
      infoEl.textContent='\u2713 Utente gi\u00e0 presente \u2014 la password rimane la stessa impostata per gli altri tool';
      if(pwdWrap){ pwdWrap.style.display='none'; const p=pwdWrap.querySelector('input[type=password]'); if(p) p.value=''; }
    }else{
      infoEl.style.cssText='display:block;margin-top:6px;padding:8px 12px;border-radius:var(--rsm);background:var(--g50);border:1px solid var(--g200);font-size:12px;color:var(--g500)';
      infoEl.textContent='Nuovo utente \u2014 inserisci una password per creare l\'account';
      if(pwdWrap) pwdWrap.style.display='';
    }
  }catch(e){ infoEl.style.display='none'; }
}
const PWD_WARN_HTML='<div style="margin-top:6px;padding:8px 12px;border-radius:var(--rsm);background:#FEF0E3;border:1px solid #f5c28a;font-size:12px;color:#7a3800;font-weight:600">\u26a0 Attenzione: questa password sar\u00e0 valida per tutti i tool che usano lo stesso account.</div>';
function renderUtentiTable(list,pb){
  const el=document.getElementById('u-table-wrap');if(!el)return;
  if(!list.length){el.innerHTML='<div class="loader" style="color:var(--g500)">Nessun utente trovato.</div>';return;}
  el.innerHTML=`<table>
    <thead><tr><th>Cognome e Nome</th><th>Email</th><th>Ruolo</th><th>Stato</th><th></th></tr></thead>
    <tbody>${list.map(r=>`<tr>
      <td class="td-nome">${esc(r.cognome||'')} ${esc(r.nome||'')}</td>
      <td class="td-muted">${esc(r.email||'')}</td>
      <td><span class="badge ${r.ruolo==='admin'?'badge-dx':'badge-sx'}">${esc(r.ruolo||'')}</span></td>
      <td><span class="badge ${r.attivo?'badge-dx':''}" style="${r.attivo?'':'background:var(--g100);color:var(--g500)'}">${r.attivo?'&#10003; Attivo':'&#10007; Inattivo'}</span></td>
      <td><div style="display:flex;gap:4px">
        <button class="btn btn-secondary btn-sm btn-icon" data-ue="${r.id}" title="Modifica">&#9998;</button>
        <button class="btn btn-danger btn-sm btn-icon" data-ud="${r.id}" title="Rimuovi profilo">&#128465;</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table>`;
  el.querySelectorAll('[data-ue]').forEach(b=>b.addEventListener('click',()=>openUtenteModal((S.profili_list||[]).find(x=>x.id===b.dataset.ue))));
  el.querySelectorAll('[data-ud]').forEach(b=>b.addEventListener('click',()=>{
    const u=(S.profili_list||[]).find(x=>x.id===b.dataset.ud);
    openConf(`Rimuovere il profilo di <strong>${u?.cognome||''} ${u?.nome||''}</strong>?<br><small style="color:var(--g500)">L'account di accesso rimane attivo sugli altri tool.</small>`,async()=>{
      const res=await fetch(`${CFG.FN}/regint-manage-user`,{method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${S.token}`},
        body:JSON.stringify({action:'delete_profile',user_id:b.dataset.ud})});
      const data=await res.json();
      if(!data.ok) throw new Error(data.error||'Errore');
      S.profili_list=(S.profili_list||[]).filter(x=>x.id!==b.dataset.ud);
      renderUtenti();toast('Profilo rimosso');
    });
  }));
}

async function renderUtenti() {
  if (!isAdmin()) { goPage('registro'); return; }
  const pb = $('pb');
  try { S.profili_list = await dbGet(T('profili'), { ord: 'cognome.asc,nome.asc' }); } catch(e) { S.profili_list = []; }
  pb.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Gestione Utenti</div>
      <div class="page-subtitle">Profili con accesso al Registro Interventi</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="u-search" placeholder="&#128269; Cerca&hellip;" style="padding:7px 12px;border:1px solid var(--g200);border-radius:var(--rsm);font-family:'Raleway',sans-serif;font-size:13px;outline:none;width:200px"/>
        <button class="btn btn-primary" id="u-add">+ Nuovo utente</button>
      </div>
    </div>
    <div class="table-wrap"><div id="u-table-wrap"></div></div>`;
  const render=q=>{const fl=(S.profili_list||[]).filter(u=>`${u.cognome||''} ${u.nome||''} ${u.email||''}`.toLowerCase().includes((q||'').toLowerCase()));renderUtentiTable(fl,pb);};
  render('');
  $('u-search').addEventListener('input',e=>render(e.target.value));
  $('u-add').addEventListener('click',()=>openUtenteModal(null));
}

function openUtenteModal(u){
  const isNew=!u;
  const html=`
    <div class="modal-head">
      <h3>${isNew?'+ Nuovo utente':'\u270f Modifica utente'}</h3>
      <button class="close-btn" onclick="closeM()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <div class="fgroup"><label>Nome</label><input id="um-nome" value="${esc(u?.nome||'')}"/></div>
        <div class="fgroup"><label>Cognome</label><input id="um-cognome" value="${esc(u?.cognome||'')}"/></div>
        <div class="fgroup span2"><label>E-Mail *</label>
          <input id="um-email" type="email" value="${esc(u?.email||'')}"
            ${isNew?'placeholder="nome@medicalgroup.it"':'readonly style="background:var(--g100);color:var(--g500);cursor:not-allowed"'}/>
          ${isNew?'<div id="um-email-info" style="display:none;margin-top:4px"></div>':''}
        </div>
        ${isNew?`<div class="fgroup span2" id="um-pwd-wrap"><label>Password *</label>
          <input id="um-pwd" type="password" placeholder="Minimo 8 caratteri"/>
          <div style="font-size:11px;color:var(--g500);margin-top:3px">
            Se l&rsquo;utente esiste gi&agrave; in un altro tool, la password non serve.
          </div>
        </div>`:''}
        <div class="fgroup"><label>Ruolo</label>
          <select id="um-ruolo">
            <option value="utente"${u?.ruolo==='utente'?' selected':''}>utente</option>
            <option value="admin"${u?.ruolo==='admin'?' selected':''}>admin</option>
          </select>
        </div>
        <div class="fgroup"><label>Stato</label>
          <select id="um-attivo-sel">
            <option value="true"${u?.attivo!==false?' selected':''}>Attivo</option>
            <option value="false"${u?.attivo===false?' selected':''}>Disattivo</option>
          </select>
        </div>
        ${!isNew?`<div class="fgroup span2">
          <label>Nuova password <span style="font-weight:400;font-size:11px;color:var(--g500)">(lascia vuoto per non modificare)</span></label>
          <input id="um-newpwd" type="password" placeholder="Minimo 8 caratteri"/>
          <div id="um-pwd-warn" style="display:none">${PWD_WARN_HTML}</div>
        </div>`:''}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeM()">Annulla</button>
      <button class="btn btn-primary" id="um-save">Salva</button>
    </div>`;
  openM(html);
  document.getElementById('um-save').addEventListener('click', async()=>{
    const nome=document.getElementById('um-nome').value.trim();
    const cognome=document.getElementById('um-cognome').value.trim();
    const email=document.getElementById('um-email').value.trim();
    const ruolo=document.getElementById('um-ruolo').value;
    const attivo=document.getElementById('um-attivo-sel').value==='true';
    if(!email){toast('Email obbligatoria','err');return;}
    const btn=document.getElementById('um-save');
    btn.disabled=true; btn.textContent='Salvataggio\u2026';
    try{
      if(isNew){
        const emailInfo=document.getElementById('um-email-info');
        const exists=emailInfo?.dataset.exists==='true';
        const pwd=document.getElementById('um-pwd')?.value||'';
        if(!exists&&pwd.length<8){toast('Password minimo 8 caratteri','err');btn.disabled=false;btn.textContent='Salva';return;}
        const payload={action:'create',email,nome,cognome,ruolo};
        if(!exists) payload.password=pwd;
        const res=await fetch(`${CFG.FN}/regint-manage-user`,{method:'POST',
          headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'},
          body:JSON.stringify(payload)});
        const data=await res.json();
        if(!data.ok) throw new Error(data.error||'Errore creazione');
        if(!S.profili_list) S.profili_list=[];
        S.profili_list.push({id:data.user_id,nome,cognome,email,ruolo,attivo:true});
        closeM(); toast(data.auth_created?'Utente creato \u2705':'Profilo collegato \u2705');
      }else{
        const pwd=document.getElementById('um-newpwd')?.value||'';
        if(pwd&&pwd.length<8){toast('Password minimo 8 caratteri','err');btn.disabled=false;btn.textContent='Salva';return;}
        const payload={action:'update',user_id:u.id,nome,cognome,email,ruolo,attivo};
        if(pwd) payload.password=pwd;
        const res=await fetch(`${CFG.FN}/regint-manage-user`,{method:'POST',
          headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'},
          body:JSON.stringify(payload)});
        const data=await res.json();
        if(!data.ok) throw new Error(data.error||'Errore aggiornamento');
        if(S.profili_list) S.profili_list=S.profili_list.map(x=>x.id===u.id?{...x,nome,cognome,ruolo,attivo}:x);
        closeM(); toast('Utente aggiornato \u2705');
      }
      renderUtenti();
    }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent='Salva';}
  });
  // check email live onblur
  if(isNew){
    const emailEl=document.getElementById('um-email');
    const infoEl=document.getElementById('um-email-info');
    const pwdWrap=document.getElementById('um-pwd-wrap');
    emailEl.addEventListener('blur',()=>checkEmailLive(emailEl,infoEl,pwdWrap,'regint-manage-user'));
  }
  // avviso password cross-tool
  if(!isNew){
    const pwdEl=document.getElementById('um-newpwd');
    const warnEl=document.getElementById('um-pwd-warn');
    if(pwdEl&&warnEl) pwdEl.addEventListener('input',()=>{warnEl.style.display=pwdEl.value.length>0?'':'none';});
  }
}

// ═══════════════════════════════════════════════════════════════
// MODAL & CONFIRM
// ═══════════════════════════════════════════════════════════════
function openM(html) {
  $('modal-box').innerHTML = html;
  $('modal-overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function closeM() {
  $('modal-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}
function openConf(msg, cb) {
  $('conf-msg').innerHTML = msg;
  $('conf-overlay').classList.remove('hidden');
  $('conf-ok').onclick = () => { closeConf(); cb(); };
}
function closeConf() {
  $('conf-overlay').classList.add('hidden');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeM(); closeConf(); }
});
</script>
